name: Lint
# Lint shell scripts (shellcheck) and markdown (markdownlint)
# Roda em PRs + push pra main. Falha CI se tiver issue.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          # SC2034 = unused vars (often intentional in our scripts)
          # SC2155 = declare and assign separately (style, low risk)
          ignore_paths: ".git"
          severity: warning
          additional_files: "scripts/*.sh scripts/recipes/*.sh"
        env:
          SHELLCHECK_OPTS: -e SC2034 -e SC2155

  python-lint:
    name: Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check scripts/recipes/*.py || true
        # Não falha CI por enquanto (warnings only)

  markdown-lint:
    name: Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            !node_modules
        continue-on-error: true
        # Markdownlint advisory only (não falha CI) — muitos recipes usam
        # convenções específicas que conflitam com lint padrão

  link-check:
    name: Internal links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check internal markdown links
        run: |
          # Validate that internal references in recipes resolve
          set -e
          MISSING=0
          for f in recipes/*.md; do
            grep -oE '\(\.\./[a-z-]+/[a-z-]+\.md[#a-z-]*\)' "$f" 2>/dev/null | while read link; do
              path=$(echo "$link" | tr -d '()' | cut -d# -f1 | sed 's|^\.\./||')
              if [[ ! -f "$path" ]]; then
                echo "BROKEN LINK in $f: $path"
                MISSING=$((MISSING+1))
              fi
            done
          done
          if [[ "$MISSING" -gt 0 ]]; then
            echo "❌ $MISSING broken internal links"
            exit 1
          fi
          echo "✅ All internal links resolve"
